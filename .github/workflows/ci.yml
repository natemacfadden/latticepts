name: CI

# run the test suite on every push and PR so regressions are caught per-commit,
# not just at release time (the Deploy workflow only runs on release/dispatch)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install numpy cython && pip install -e ".[test]"
      - name: Test
        run: pytest tests/

  c-kernel:
    name: C kernel (warnings + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Compile box_enum.h standalone with -Wall -Wextra -Werror (gates the
      # memory-unsafe C hot path, no Cython-generated-C noise) and run the test.
      - name: Build + run C-kernel test
        run: make -C tests/c test EXTRA_CFLAGS=-Werror

  openmp:
    name: OpenMP build + parallel test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # build the OpenMP path so test_parallel_matches_serial actually exercises
      # it (the default build is serial, leaving that test a no-op in CI)
      - name: Install (OpenMP build)
        run: pip install numpy cython && LATTICEPTS_OPENMP=1 pip install -e ".[test]"
      - name: Test
        run: pytest tests/

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check latticepts/
